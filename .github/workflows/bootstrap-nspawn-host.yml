name: One-time nspawn host bootstrap

on:
  push:
    branches: [build/standalone-deployment-system-v2]
  pull_request:
    branches: [main]
    types: [opened, reopened]

permissions:
  contents: read

concurrency:
  group: baby-quirt-one-time-nspawn-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap-and-certify:
    if: >-
      (github.event_name == 'push' &&
      github.event.head_commit.message == 'chore: authorize one-time nspawn host bootstrap') ||
      (github.event_name == 'pull_request' &&
      github.event.pull_request.head.ref == 'build/standalone-deployment-system-v2')
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout exact authorization commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate the isolated authorization commit
        id: authorization
        run: |
          set -euo pipefail
          test "$(git diff-tree --no-commit-id --name-only -r HEAD | sed '/^$/d')" = '.github/nspawn-bootstrap-authorization.json'
          python3 - <<'PY'
          import datetime
          import json
          import os
          import re
          import subprocess

          with open('.github/nspawn-bootstrap-authorization.json', encoding='utf-8') as handle:
              record = json.load(handle)
          expected = {
              'recordVersion', 'action', 'babyCommit', 'babyTree', 'gatewayCommit',
              'gatewayTree', 'expiresAt', 'hostMachineIdSha256',
          }
          assert set(record) == expected
          assert record['recordVersion'] == '1.0.0'
          assert record['action'] == 'create-babycert-v1-and-run-first-certification'
          parent = subprocess.check_output(['git', 'rev-parse', 'HEAD^'], text=True).strip()
          tree = subprocess.check_output(['git', 'rev-parse', 'HEAD^^{tree}'], text=True).strip()
          assert record['babyCommit'] == parent
          assert record['babyTree'] == tree
          assert re.fullmatch(r'[a-f0-9]{40}', record['gatewayCommit'])
          assert re.fullmatch(r'[a-f0-9]{40}', record['gatewayTree'])
          assert re.fullmatch(r'[a-f0-9]{64}', record['hostMachineIdSha256'])
          expires = datetime.datetime.fromisoformat(record['expiresAt'].replace('Z', '+00:00'))
          now = datetime.datetime.now(datetime.timezone.utc)
          assert now < expires <= now + datetime.timedelta(hours=24)
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f"baby_commit={record['babyCommit']}\n")
              output.write(f"baby_tree={record['babyTree']}\n")
              output.write(f"gateway_commit={record['gatewayCommit']}\n")
              output.write(f"gateway_tree={record['gatewayTree']}\n")
              output.write(f"machine_id={record['hostMachineIdSha256']}\n")
          PY

      - name: Checkout exact gateway source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
        with:
          repository: StealthEyeLLC/baby-quirt-mcp
          ref: ${{ steps.authorization.outputs.gateway_commit }}
          fetch-depth: 0
          path: gateway
          token: ${{ secrets.quirt_all_gh_token }}
          persist-credentials: false

      - name: Checkout exact Baby implementation source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
        with:
          repository: StealthEyeLLC/baby-quirt
          ref: ${{ steps.authorization.outputs.baby_commit }}
          fetch-depth: 0
          path: baby-source
          persist-credentials: false

      - name: Verify exact source identities
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = '${{ steps.authorization.outputs.baby_commit }}'
          test "$(git rev-parse HEAD^^{tree})" = '${{ steps.authorization.outputs.baby_tree }}'
          test "$(git -C baby-source rev-parse HEAD)" = '${{ steps.authorization.outputs.baby_commit }}'
          test "$(git -C baby-source rev-parse HEAD^{tree})" = '${{ steps.authorization.outputs.baby_tree }}'
          test "$(git -C gateway rev-parse HEAD)" = '${{ steps.authorization.outputs.gateway_commit }}'
          test "$(git -C gateway rev-parse HEAD^{tree})" = '${{ steps.authorization.outputs.gateway_tree }}'
          git diff --quiet
          git diff --cached --quiet
          test -z "$(git -C baby-source status --porcelain=v1 --untracked-files=all)"
          test -z "$(git -C gateway status --porcelain=v1 --untracked-files=all)"

      - name: Install host-build dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential gcc g++ make python3 python3-dev pkg-config git openssh-client tar

      - name: Setup pinned Node 24.18
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.18.0'
          cache: npm

      - name: Build and verify the exact runner payload
        run: |
          set -euo pipefail
          npm ci --include=dev --no-audit --no-fund
          npm run lint
          node --import tsx --test \
            test/nspawn-bootstrap.test.ts \
            test/nspawn-input.test.ts
          sudo "$(command -v node)" --import tsx --test \
            test/nspawn-rehearsal.test.ts
          npm run build
          bash -n ops/rehearsal/bootstrap-nspawn-host.sh ops/rehearsal/baby-quirt-nspawn-runner
          node --check ops/rehearsal/baby-quirt-host-certification.mjs
          PYTHONPYCACHEPREFIX=/tmp/baby-quirt-nspawn-pycache \
            python3 -m py_compile ops/rehearsal/baby-quirt-peer-cred-probe.py
          npm --prefix gateway ci --include=dev --no-audit --no-fund

      - name: Assemble offline dependency cache and bootstrap payload
        run: |
          set -euo pipefail
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner \
            -C "$HOME/.npm" -cf /tmp/npm-cache.tar _cacache
          mkdir -p /tmp/baby-quirt-nspawn-payload/dist/src/rehearsal
          mkdir -p /tmp/baby-quirt-nspawn-payload/dist/src/crypto
          mkdir -p /tmp/baby-quirt-nspawn-payload/dist/scripts
          mkdir -p /tmp/baby-quirt-nspawn-payload/ops
          cp dist/src/rehearsal/*.js /tmp/baby-quirt-nspawn-payload/dist/src/rehearsal/
          cp dist/src/crypto/canonical.js dist/src/crypto/signing.js \
            /tmp/baby-quirt-nspawn-payload/dist/src/crypto/
          cp dist/scripts/prepare-nspawn-input.js /tmp/baby-quirt-nspawn-payload/dist/scripts/
          cp -R ops/rehearsal /tmp/baby-quirt-nspawn-payload/ops/rehearsal
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner \
            -C /tmp/baby-quirt-nspawn-payload -czf /tmp/baby-quirt-nspawn-payload.tar.gz .
          (cd /tmp && sha256sum baby-quirt-nspawn-payload.tar.gz > baby-quirt-nspawn-payload.sha256)

      - name: Validate SSH configuration
        env:
          VPS_HOST: ${{ vars.BABY_QUIRT_VPS_HOST }}
          EXPECTED_HOSTNAME: ${{ vars.BABY_QUIRT_EXPECTED_HOSTNAME }}
          EXPECTED_MACHINE_ID: ${{ vars.BABY_QUIRT_EXPECTED_MACHINE_ID_SHA256 }}
          SSH_PRIVATE_KEY: ${{ secrets.BABY_QUIRT_VPS_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.BABY_QUIRT_VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$EXPECTED_HOSTNAME"
          test "$EXPECTED_MACHINE_ID" = '${{ steps.authorization.outputs.machine_id }}'
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/nspawn_bootstrap_key
          chmod 0600 ~/.ssh/nspawn_bootstrap_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Read-only VPS identity and capacity gate
        env:
          EXPECTED_HOSTNAME: ${{ vars.BABY_QUIRT_EXPECTED_HOSTNAME }}
          EXPECTED_MACHINE_ID: ${{ steps.authorization.outputs.machine_id }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/nspawn_bootstrap_key -p '${{ vars.BABY_QUIRT_VPS_PORT || 22 }}' \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            '${{ vars.BABY_QUIRT_VPS_USER || 'ubuntu' }}@${{ vars.BABY_QUIRT_VPS_HOST }}' \
            "test \"\$(hostname)\" = '$EXPECTED_HOSTNAME' && \
             test \"\$(tr -d '\\r\\n' </etc/machine-id | sha256sum | awk '{print \$1}')\" = '$EXPECTED_MACHINE_ID' && \
             test \"\$(ps -p 1 -o comm= | tr -d ' ')\" = systemd && \
             test \"\$(stat -fc %T /sys/fs/cgroup)\" = cgroup2fs && \
             test \"\$(/opt/node-v24.18.0-linux-x64/bin/node --version)\" = v24.18.0 && \
             sudo -n true && \
             { sudo -n test -f /etc/baby-quirt-nspawn/bootstrap.json || \
               test \"\$(df -B1 --output=avail / | awk 'NR==2 {print \$1}')\" -ge 27917287424; }"

      - name: Upload and execute exact one-time bootstrap
        env:
          REMOTE_STAGE: /tmp/baby-quirt-nspawn-bootstrap-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/nspawn_bootstrap_key -p '${{ vars.BABY_QUIRT_VPS_PORT || 22 }}' \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            '${{ vars.BABY_QUIRT_VPS_USER || 'ubuntu' }}@${{ vars.BABY_QUIRT_VPS_HOST }}' \
            "umask 077; mkdir '$REMOTE_STAGE'"
          scp -i ~/.ssh/nspawn_bootstrap_key -P '${{ vars.BABY_QUIRT_VPS_PORT || 22 }}' \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            /tmp/baby-quirt-nspawn-payload.tar.gz /tmp/baby-quirt-nspawn-payload.sha256 \
            '${{ vars.BABY_QUIRT_VPS_USER || 'ubuntu' }}@${{ vars.BABY_QUIRT_VPS_HOST }}':"$REMOTE_STAGE/"
          ssh -i ~/.ssh/nspawn_bootstrap_key -p '${{ vars.BABY_QUIRT_VPS_PORT || 22 }}' \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            '${{ vars.BABY_QUIRT_VPS_USER || 'ubuntu' }}@${{ vars.BABY_QUIRT_VPS_HOST }}' \
            "cd '$REMOTE_STAGE' && sha256sum -c baby-quirt-nspawn-payload.sha256 && \
             mkdir payload && tar -xzf baby-quirt-nspawn-payload.tar.gz -C payload && \
             sudo -n /bin/bash payload/ops/rehearsal/bootstrap-nspawn-host.sh --confirm-create-babycert-v1 && \
             sudo -n cat /etc/baby-quirt-nspawn/bootstrap.json" \
            | tee /tmp/bootstrap-output.log
          ssh -i ~/.ssh/nspawn_bootstrap_key -p '${{ vars.BABY_QUIRT_VPS_PORT || 22 }}' \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            '${{ vars.BABY_QUIRT_VPS_USER || 'ubuntu' }}@${{ vars.BABY_QUIRT_VPS_HOST }}' \
            'sudo -n cat /etc/baby-quirt-nspawn/bootstrap.json' > /tmp/bootstrap.json

      - name: Build exact offline certification inputs
        run: |
          set -euo pipefail
          RUN_ID="cert-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          REQUESTED_AT=$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')
          DEADLINE=$(date -u -d '+5 hours' +'%Y-%m-%dT%H:%M:%S.000Z')
          printf 'RUN_ID=%s\n' "$RUN_ID" >> "$GITHUB_ENV"
          node \
            dist/scripts/prepare-nspawn-input.js \
            --run-id "$RUN_ID" \
            --requested-at "$REQUESTED_AT" \
            --deadline "$DEADLINE" \
            --baby-repo "$GITHUB_WORKSPACE/baby-source" \
            --baby-commit '${{ steps.authorization.outputs.baby_commit }}' \
            --gateway-repo "$GITHUB_WORKSPACE/gateway" \
            --gateway-commit '${{ steps.authorization.outputs.gateway_commit }}' \
            --dependency-cache /tmp/npm-cache.tar \
            --bootstrap-record /tmp/bootstrap.json \
            --output-root "/tmp/$RUN_ID"

      - name: Install inputs and run first standalone certification
        run: |
          set -euo pipefail
          REMOTE_INPUT="/tmp/$RUN_ID-input"
          ssh -i ~/.ssh/nspawn_bootstrap_key -p '${{ vars.BABY_QUIRT_VPS_PORT || 22 }}' \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            '${{ vars.BABY_QUIRT_VPS_USER || 'ubuntu' }}@${{ vars.BABY_QUIRT_VPS_HOST }}' \
            "umask 077; mkdir '$REMOTE_INPUT'"
          scp -i ~/.ssh/nspawn_bootstrap_key -P '${{ vars.BABY_QUIRT_VPS_PORT || 22 }}' \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "/tmp/$RUN_ID/"* \
            '${{ vars.BABY_QUIRT_VPS_USER || 'ubuntu' }}@${{ vars.BABY_QUIRT_VPS_HOST }}':"$REMOTE_INPUT/"
          ssh -i ~/.ssh/nspawn_bootstrap_key -p '${{ vars.BABY_QUIRT_VPS_PORT || 22 }}' \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            '${{ vars.BABY_QUIRT_VPS_USER || 'ubuntu' }}@${{ vars.BABY_QUIRT_VPS_HOST }}' \
            "sudo -n test ! -e '/var/lib/baby-quirt-nspawn/inputs/$RUN_ID' && \
             sudo -n install -d -o root -g root -m 0700 '/var/lib/baby-quirt-nspawn/inputs/$RUN_ID' && \
             sudo -n install -o root -g root -m 0600 '$REMOTE_INPUT/plan.json' '/var/lib/baby-quirt-nspawn/inputs/$RUN_ID/plan.json' && \
             sudo -n install -o root -g root -m 0600 '$REMOTE_INPUT/baby-quirt.bundle' '/var/lib/baby-quirt-nspawn/inputs/$RUN_ID/baby-quirt.bundle' && \
             sudo -n install -o root -g root -m 0600 '$REMOTE_INPUT/baby-quirt-mcp.bundle' '/var/lib/baby-quirt-nspawn/inputs/$RUN_ID/baby-quirt-mcp.bundle' && \
             sudo -n install -o root -g root -m 0600 '$REMOTE_INPUT/npm-cache.tar' '/var/lib/baby-quirt-nspawn/inputs/$RUN_ID/npm-cache.tar' && \
             sudo -n /usr/local/sbin/baby-quirt-nspawn-runner preflight '$RUN_ID' && \
             sudo -n /usr/local/sbin/baby-quirt-nspawn-runner run '$RUN_ID'" \
            | tee /tmp/nspawn-receipt.json

      - name: Collect signed host evidence
        if: always() && env.RUN_ID != ''
        run: |
          set -euo pipefail
          if ssh -i ~/.ssh/nspawn_bootstrap_key -p '${{ vars.BABY_QUIRT_VPS_PORT || 22 }}' \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            '${{ vars.BABY_QUIRT_VPS_USER || 'ubuntu' }}@${{ vars.BABY_QUIRT_VPS_HOST }}' \
            "sudo -n test -d '/var/lib/baby-quirt-nspawn/evidence/$RUN_ID'"; then
            ssh -i ~/.ssh/nspawn_bootstrap_key -p '${{ vars.BABY_QUIRT_VPS_PORT || 22 }}' \
              -o BatchMode=yes -o StrictHostKeyChecking=yes \
              '${{ vars.BABY_QUIRT_VPS_USER || 'ubuntu' }}@${{ vars.BABY_QUIRT_VPS_HOST }}' \
              "sudo -n tar -C '/var/lib/baby-quirt-nspawn/evidence/$RUN_ID' -czf - ." \
              > /tmp/baby-quirt-nspawn-evidence.tar.gz
          fi

      - name: Upload certification evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: baby-quirt-nspawn-bootstrap-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/bootstrap-output.log
            /tmp/bootstrap.json
            /tmp/nspawn-receipt.json
            /tmp/baby-quirt-nspawn-evidence.tar.gz
          if-no-files-found: warn
          retention-days: 30

      - name: Remove ephemeral SSH and staging material
        if: always()
        env:
          REMOTE_STAGE: /tmp/baby-quirt-nspawn-bootstrap-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          if test -f ~/.ssh/nspawn_bootstrap_key; then
            ssh -i ~/.ssh/nspawn_bootstrap_key -p '${{ vars.BABY_QUIRT_VPS_PORT || 22 }}' \
              -o BatchMode=yes -o StrictHostKeyChecking=yes \
              '${{ vars.BABY_QUIRT_VPS_USER || 'ubuntu' }}@${{ vars.BABY_QUIRT_VPS_HOST }}' \
              "sudo -n rm -rf -- '$REMOTE_STAGE' '/tmp/${RUN_ID:-not-created}-input'" || true
          fi
          rm -f ~/.ssh/nspawn_bootstrap_key
