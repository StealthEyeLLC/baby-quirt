name: Bootstrap Baby Quirt Secrets

# One-time, manually-dispatched workflow that finishes Baby Quirt bootstrap
# credential provisioning. It generates fresh CI deploy + gateway keys inside
# the runner, preserves the matching public material on a temporary recovery
# branch BEFORE rotating secrets, stores the private halves as GitHub Actions
# repository secrets, fast-forwards the fixed feature branch with the public
# material, and reports fingerprints.
#
# It performs NO deployment and never connects to the VPS with the generated
# key. Remove this workflow from main after a successful, verified run.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: baby-quirt-bootstrap-secrets
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Secret administration uses the existing repository PAT secret only.
      GH_TOKEN: ${{ secrets.QUIRT_SEC_GH_TOKEN }}
      REPO: StealthEyeLLC/baby-quirt
      # Fixed, non-user-selectable bootstrap target. No arbitrary inputs exist.
      TARGET_BRANCH: cursor/baby-quirt-core-e857
      EXPECTED_HEAD: 41669f6f86a702f831ef9624e5e0335fc73e0242
      VPS_HOST: 51.81.86.225
      VPS_PORT: '22'
      VPS_HOST_FP: 'SHA256:hTe07vTyIU1bZ6C56+58+T2PgctkQ+RYkepn/5j+aaE'
    steps:
      - name: Preflight authorization and PR state (no checkout)
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "ERROR: QUIRT_SEC_GH_TOKEN is empty" >&2
            exit 1
          fi
          # Fixed-parameter guards.
          test "$TARGET_BRANCH" = "cursor/baby-quirt-core-e857"
          printf '%s' "$EXPECTED_HEAD" | grep -Eq '^[0-9a-f]{40}$'

          gh auth status
          gh api "repos/${REPO}/actions/secrets/public-key" >/dev/null

          FULL_NAME="$(gh api "repos/${REPO}" --jq '.full_name')"
          test "$FULL_NAME" = "StealthEyeLLC/baby-quirt"

          PUSH_ACCESS="$(gh api "repos/${REPO}" --jq '.permissions.push')"
          test "$PUSH_ACCESS" = "true"

          HEAD_SHA="$(gh api "repos/${REPO}/git/ref/heads/${TARGET_BRANCH}" --jq '.object.sha')"
          test "$HEAD_SHA" = "$EXPECTED_HEAD"

          PR_STATE="$(gh pr view 2 --repo "$REPO" --json state --jq '.state')"
          PR_MERGED_AT="$(gh pr view 2 --repo "$REPO" --json mergedAt --jq '.mergedAt // ""')"
          PR_HEAD="$(gh pr view 2 --repo "$REPO" --json headRefOid --jq '.headRefOid')"
          test "$PR_STATE" = "OPEN"
          test -z "$PR_MERGED_AT"
          test "$PR_HEAD" = "$EXPECTED_HEAD"

          echo "Preflight OK: repo, push authority, secret API, target head, and PR #2 state verified."

      - name: Checkout exact expected commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
        with:
          ref: ${{ env.EXPECTED_HEAD }}
          token: ${{ secrets.QUIRT_SEC_GH_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Verify checked-out commit
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          echo "Local HEAD matches expected bootstrap commit."

      - name: Generate keys, preserve public material on recovery branch
        run: |
          set -euo pipefail
          umask 077
          BOOT="$RUNNER_TEMP/baby-quirt-bootstrap"
          rm -rf "$BOOT"
          mkdir -p "$BOOT"
          chmod 700 "$BOOT"

          # --- CI deployment Ed25519 keypair ---
          ssh-keygen -t ed25519 -a 64 -N '' -C 'baby-quirt-ci-bootstrap' -f "$BOOT/ci-deploy"
          chmod 600 "$BOOT/ci-deploy"
          chmod 644 "$BOOT/ci-deploy.pub"
          ssh-keygen -y -f "$BOOT/ci-deploy" > "$BOOT/ci-deploy-derived.pub"
          diff <(awk '{print $1, $2}' "$BOOT/ci-deploy.pub") \
               <(awk '{print $1, $2}' "$BOOT/ci-deploy-derived.pub")
          CI_FP="$(ssh-keygen -lf "$BOOT/ci-deploy.pub" | awk '{print $2}')"
          CI_PUBKEY_LINE="$(cat "$BOOT/ci-deploy.pub")"
          [ -n "$CI_FP" ]

          # --- Gateway authority Ed25519 keypair ---
          openssl genpkey -algorithm ED25519 -out "$BOOT/gateway-authority-private.pem"
          chmod 600 "$BOOT/gateway-authority-private.pem"
          openssl pkey -in "$BOOT/gateway-authority-private.pem" -pubout \
            -out "$BOOT/gateway-authority-public.pem"
          chmod 644 "$BOOT/gateway-authority-public.pem"
          openssl pkey -in "$BOOT/gateway-authority-private.pem" -pubout \
            -out "$BOOT/gateway-derived-public.pem"
          diff "$BOOT/gateway-authority-public.pem" "$BOOT/gateway-derived-public.pem"
          GATEWAY_FP="$(sha256sum "$BOOT/gateway-authority-public.pem" | awk '{print $1}')"
          [ -n "$GATEWAY_FP" ]

          # --- VPS host-key pin ---
          ssh-keyscan -p "$VPS_PORT" -t ed25519 "$VPS_HOST" > "$BOOT/known_hosts" 2>/dev/null
          test -s "$BOOT/known_hosts"
          if [ "$(grep -c "^${VPS_HOST} ssh-ed25519 " "$BOOT/known_hosts")" -ne 1 ]; then
            echo "ERROR: expected exactly one ed25519 host-key line" >&2
            exit 1
          fi
          HOST_FP="$(ssh-keygen -lf "$BOOT/known_hosts" | awk '{print $2}')"
          if [ "$HOST_FP" != "$VPS_HOST_FP" ]; then
            echo "ERROR: VPS host-key fingerprint mismatch: ${HOST_FP}" >&2
            exit 1
          fi

          # --- Replace committed public material only ---
          cp "$BOOT/ci-deploy.pub" ops/bootstrap/baby-quirt-ci-deploy.pub
          cp "$BOOT/gateway-authority-public.pem" ops/bootstrap/gateway-authority-public.pem
          GATEWAY_FP="$GATEWAY_FP" CI_FP="$CI_FP" HOST_FP="$HOST_FP" python3 - <<'PY'
          import os
          path = "ops/bootstrap/README.md"
          vals = {
              "Gateway authority public key": os.environ["GATEWAY_FP"],
              "CI deploy SSH public key": os.environ["CI_FP"],
              "VPS SSH host key (ed25519)": os.environ["HOST_FP"],
          }
          out, in_section = [], False
          for line in open(path).read().split("\n"):
              if line.startswith("## "):
                  in_section = line.strip() == "## Fingerprints (non-secret)"
              if in_section and line.startswith("|"):
                  cells = [c.strip() for c in line.strip().strip("|").split("|")]
                  if len(cells) == 2 and cells[0] in vals:
                      line = "| " + cells[0] + " | `" + vals[cells[0]] + "` |"
              out.append(line)
          open(path, "w").write("\n".join(out))
          PY

          # --- Create the public-key commit with parent EXPECTED_HEAD ---
          git config user.name "baby-quirt-bootstrap[bot]"
          git config user.email "baby-quirt-bootstrap[bot]@users.noreply.github.com"
          git add ops/bootstrap/baby-quirt-ci-deploy.pub \
                  ops/bootstrap/gateway-authority-public.pem \
                  ops/bootstrap/README.md
          EXPECTED_STAGED="$(
            printf '%s\n' \
              ops/bootstrap/README.md \
              ops/bootstrap/baby-quirt-ci-deploy.pub \
              ops/bootstrap/gateway-authority-public.pem |
              sort
          )"

          ACTUAL_STAGED="$(
            git diff --cached --name-only |
              sort
          )"

          if [ "$ACTUAL_STAGED" != "$EXPECTED_STAGED" ]; then
            echo "ERROR: unexpected staged paths" >&2
            printf 'Expected:\n%s\nActual:\n%s\n' \
              "$EXPECTED_STAGED" "$ACTUAL_STAGED" >&2
            exit 1
          fi

          while IFS= read -r PATHNAME; do
            if git show ":$PATHNAME" |
              grep -Eq '^-----BEGIN ((OPENSSH|RSA|EC|DSA|ENCRYPTED) )?PRIVATE KEY-----$'
            then
              echo "ERROR: private key material staged in $PATHNAME" >&2
              exit 1
            fi
          done <<< "$ACTUAL_STAGED"

          if git diff --cached --quiet; then
            echo "ERROR: expected public-key changes but none were staged" >&2
            exit 1
          fi
          git diff --cached --stat
          git commit -m "chore: synchronize final bootstrap credentials"
          FINAL_HEAD="$(git rev-parse HEAD)"
          test "$(git rev-parse HEAD^)" = "$EXPECTED_HEAD"

          # --- Preserve public material on a unique recovery branch FIRST ---
          STAGING_BRANCH="bootstrap/baby-quirt-credentials-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git push origin "HEAD:refs/heads/$STAGING_BRANCH"
          STAGING_SHA="$(gh api "repos/${REPO}/git/ref/heads/${STAGING_BRANCH}" --jq '.object.sha')"
          test "$STAGING_SHA" = "$FINAL_HEAD"

          # --- Recoverability evidence BEFORE any secret is written ---
          {
            echo "# Baby Quirt Bootstrap - pre-provision recovery evidence"
            echo
            echo "- Generated credential commit: \`$FINAL_HEAD\`"
            echo "- Recovery (staging) branch: \`$STAGING_BRANCH\`"
            echo "- CI deploy public-key line: \`$CI_PUBKEY_LINE\`"
            echo "- CI deploy fingerprint: \`$CI_FP\`"
            echo "- Gateway public-key fingerprint: \`$GATEWAY_FP\`"
            echo "- VPS host-key fingerprint: \`$HOST_FP\`"
            echo
            echo "Gateway authority public key (PEM, non-secret):"
            echo '```'
            cat "$BOOT/gateway-authority-public.pem"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          {
            echo "CI_FP=$CI_FP"
            echo "CI_PUBKEY_LINE=$CI_PUBKEY_LINE"
            echo "GATEWAY_FP=$GATEWAY_FP"
            echo "HOST_FP=$HOST_FP"
            echo "FINAL_HEAD=$FINAL_HEAD"
            echo "STAGING_BRANCH=$STAGING_BRANCH"
          } >> "$GITHUB_ENV"

      - name: Provision secrets and fast-forward target branch
        run: |
          set -euo pipefail
          BOOT="$RUNNER_TEMP/baby-quirt-bootstrap"

          for REQUIRED_FILE in \
            "$BOOT/ci-deploy" \
            "$BOOT/ci-deploy.pub" \
            "$BOOT/known_hosts" \
            "$BOOT/gateway-authority-private.pem" \
            "$BOOT/gateway-authority-public.pem"
          do
            test -s "$REQUIRED_FILE" || {
              echo "ERROR: required bootstrap material is missing: $REQUIRED_FILE" >&2
              exit 1
            }
          done

          # --- Store private materials as repository Actions secrets ---
          gh secret set BABY_QUIRT_VPS_SSH_PRIVATE_KEY --repo "$REPO" < "$BOOT/ci-deploy"
          gh secret set BABY_QUIRT_VPS_SSH_KNOWN_HOSTS --repo "$REPO" < "$BOOT/known_hosts"
          gh secret set BABY_QUIRT_GATEWAY_SIGNING_PRIVATE_KEY --repo "$REPO" < "$BOOT/gateway-authority-private.pem"

          # --- Repository variables (non-secret) ---
          gh variable set BABY_QUIRT_VPS_HOST --repo "$REPO" --body "51.81.86.225"
          gh variable set BABY_QUIRT_VPS_PORT --repo "$REPO" --body "22"
          gh variable set BABY_QUIRT_VPS_USER --repo "$REPO" --body "ubuntu"
          gh variable set BABY_QUIRT_EXPECTED_HOSTNAME --repo "$REPO" --body "vps-c9f04f5e"
          gh variable set BABY_QUIRT_EXPECTED_MACHINE_ID_SHA256 --repo "$REPO" --body "cd189817b39fea60d338b73878240a6fe7db71374c7a0f35ad60f8eb641e8817"
          gh variable set BABY_QUIRT_GATEWAY_USER --repo "$REPO" --body "fix-mcp"
          gh variable set BABY_QUIRT_GATEWAY_UID --repo "$REPO" --body "997"
          gh variable set BABY_QUIRT_GATEWAY_ID --repo "$REPO" --body "stealtheye-horsey-gateway"
          gh variable set BABY_QUIRT_EXPECTED_SUBJECT --repo "$REPO" --body "stealtheye-owner"
          gh variable set BABY_QUIRT_AUTHORITY_CLASS --repo "$REPO" --body "unrestricted-owner"
          gh variable set BABY_QUIRT_OAUTH_ISSUER --repo "$REPO" --body "https://mcp.stealtheye.io"
          gh variable set BABY_QUIRT_OAUTH_RESOURCE --repo "$REPO" --body "https://mcp.stealtheye.io"
          gh variable set BABY_QUIRT_OAUTH_AUDIENCE --repo "$REPO" --body "https://mcp.stealtheye.io"
          gh variable set BABY_QUIRT_OAUTH_JWKS_URI --repo "$REPO" --body "https://mcp.stealtheye.io/oauth/jwks.json"
          gh variable set BABY_QUIRT_OWNER_PRINCIPAL_FINGERPRINT --repo "$REPO" --body "$GATEWAY_FP"

          # --- Recheck target is still exactly EXPECTED_HEAD before advancing ---
          CUR_BEFORE="$(gh api "repos/${REPO}/git/ref/heads/${TARGET_BRANCH}" --jq '.object.sha')"
          if [ "$CUR_BEFORE" != "$EXPECTED_HEAD" ]; then
            echo "ERROR: target branch moved to ${CUR_BEFORE} after secret provisioning." >&2
            echo "Public material preserved on recovery branch ${STAGING_BRANCH} at ${FINAL_HEAD}." >&2
            exit 1
          fi

          # --- Fast-forward the target branch (never force-push) ---
          if ! git push origin "HEAD:refs/heads/${TARGET_BRANCH}"; then
            echo "ERROR: secrets provisioned but target-branch push failed." >&2
            echo "Recovery branch ${STAGING_BRANCH} holds matching public commit ${FINAL_HEAD}." >&2
            exit 1
          fi

          CUR_AFTER="$(gh api "repos/${REPO}/git/ref/heads/${TARGET_BRANCH}" --jq '.object.sha')"
          if [ "$CUR_AFTER" != "$FINAL_HEAD" ]; then
            echo "ERROR: target branch ${CUR_AFTER} != generated credential commit ${FINAL_HEAD}." >&2
            echo "Recovery branch ${STAGING_BRANCH} holds matching public commit ${FINAL_HEAD}." >&2
            exit 1
          fi
          echo "Secrets provisioned and target branch fast-forwarded to generated commit."

      - name: Verify secret names (names only, never values)
        run: |
          set -euo pipefail
          NAMES="$(gh secret list --repo "$REPO" --json name --jq '.[].name')"
          for REQUIRED in \
            QUIRT_ALL_GH_TOKEN \
            QUIRT_SEC_GH_TOKEN \
            BABY_QUIRT_VPS_SSH_PRIVATE_KEY \
            BABY_QUIRT_VPS_SSH_KNOWN_HOSTS \
            BABY_QUIRT_GATEWAY_SIGNING_PRIVATE_KEY; do
            printf '%s\n' "$NAMES" | grep -Fxq "$REQUIRED" || {
              echo "ERROR: missing repository secret $REQUIRED" >&2
              exit 1
            }
          done
          for FORBIDDEN in quirt_sec_gh_token quirt_all_gh_token; do
            if printf '%s\n' "$NAMES" | grep -Fxq "$FORBIDDEN"; then
              echo "ERROR: lowercase token secret $FORBIDDEN must not exist" >&2
              exit 1
            fi
          done
          echo "Secret names verified: required present, forbidden absent."

      - name: Verify all repository variable values exactly
        run: |
          set -euo pipefail
          gh variable list --repo "$REPO" --json name,value > "$RUNNER_TEMP/vars.json"
          GATEWAY_FP="$GATEWAY_FP" VARS_JSON="$RUNNER_TEMP/vars.json" python3 - <<'PY'
          import json, os, sys
          expected = {
              "BABY_QUIRT_VPS_HOST": "51.81.86.225",
              "BABY_QUIRT_VPS_PORT": "22",
              "BABY_QUIRT_VPS_USER": "ubuntu",
              "BABY_QUIRT_EXPECTED_HOSTNAME": "vps-c9f04f5e",
              "BABY_QUIRT_EXPECTED_MACHINE_ID_SHA256": "cd189817b39fea60d338b73878240a6fe7db71374c7a0f35ad60f8eb641e8817",
              "BABY_QUIRT_GATEWAY_USER": "fix-mcp",
              "BABY_QUIRT_GATEWAY_UID": "997",
              "BABY_QUIRT_GATEWAY_ID": "stealtheye-horsey-gateway",
              "BABY_QUIRT_EXPECTED_SUBJECT": "stealtheye-owner",
              "BABY_QUIRT_AUTHORITY_CLASS": "unrestricted-owner",
              "BABY_QUIRT_OAUTH_ISSUER": "https://mcp.stealtheye.io",
              "BABY_QUIRT_OAUTH_RESOURCE": "https://mcp.stealtheye.io",
              "BABY_QUIRT_OAUTH_AUDIENCE": "https://mcp.stealtheye.io",
              "BABY_QUIRT_OAUTH_JWKS_URI": "https://mcp.stealtheye.io/oauth/jwks.json",
              "BABY_QUIRT_OWNER_PRINCIPAL_FINGERPRINT": os.environ["GATEWAY_FP"],
          }
          data = {v["name"]: v["value"] for v in json.load(open(os.environ["VARS_JSON"]))}
          missing = [k for k in expected if k not in data]
          mismatch = [(k, data[k]) for k, val in expected.items() if k in data and data[k] != val]
          if missing or mismatch:
              print("missing:", missing)
              print("mismatch:", mismatch)
              sys.exit(1)
          print("all %d repository variables verified exactly" % len(expected))
          PY

      - name: Verify exact final head lineage
        run: |
          set -euo pipefail
          CURRENT_HEAD="$(gh api "repos/${REPO}/git/ref/heads/${TARGET_BRANCH}" --jq '.object.sha')"
          test "$CURRENT_HEAD" = "$FINAL_HEAD" || {
            echo "ERROR: target branch does not equal generated credential commit" >&2
            exit 1
          }
          git merge-base --is-ancestor "$EXPECTED_HEAD" "$FINAL_HEAD"
          test "$(git rev-parse "${FINAL_HEAD}^")" = "$EXPECTED_HEAD"
          echo "Final head lineage verified: FINAL_HEAD is a direct child of EXPECTED_HEAD."

      - name: Reverify PR #2 after mutation
        run: |
          set -euo pipefail
          PR_STATE="$(gh pr view 2 --repo "$REPO" --json state --jq '.state')"
          PR_MERGED_AT="$(gh pr view 2 --repo "$REPO" --json mergedAt --jq '.mergedAt // ""')"
          PR_HEAD="$(gh pr view 2 --repo "$REPO" --json headRefOid --jq '.headRefOid')"
          test "$PR_STATE" = "OPEN"
          test -z "$PR_MERGED_AT"
          test "$PR_HEAD" = "$FINAL_HEAD"
          echo "PR #2 reverified: open, unmerged, head now equals generated commit."

      - name: Write non-secret evidence summary
        run: |
          set -euo pipefail
          {
            echo "# Baby Quirt Bootstrap Secret Provisioning - result"
            echo
            echo "- Repository: \`$REPO\`"
            echo "- Target branch: \`$TARGET_BRANCH\`"
            echo "- Starting head: \`$EXPECTED_HEAD\`"
            echo "- Final head: \`$FINAL_HEAD\`"
            echo "- Recovery (staging) branch: \`$STAGING_BRANCH\`"
            echo "- Secret names configured: \`BABY_QUIRT_VPS_SSH_PRIVATE_KEY\`, \`BABY_QUIRT_VPS_SSH_KNOWN_HOSTS\`, \`BABY_QUIRT_GATEWAY_SIGNING_PRIVATE_KEY\`"
            echo "- CI deploy public-key line: \`$CI_PUBKEY_LINE\`"
            echo "- CI deploy fingerprint: \`$CI_FP\`"
            echo "- Gateway public-key fingerprint: \`$GATEWAY_FP\`"
            echo "- Owner-principal fingerprint: \`$GATEWAY_FP\`"
            echo "- VPS host-key fingerprint: \`$HOST_FP\`"
            echo
            echo "This workflow executed no deployment command."
            echo "This workflow did not authenticate to the VPS with the generated deployment key."
            echo "PR #2 state was queried and verified open/unmerged."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Delete recovery branch after all checks pass
        run: |
          set -euo pipefail
          git push origin --delete "$STAGING_BRANCH"
          echo "Recovery branch ${STAGING_BRANCH} deleted after successful verification."

      - name: Cleanup bootstrap material
        if: always()
        run: rm -rf "$RUNNER_TEMP/baby-quirt-bootstrap"
