name: Bootstrap Baby Quirt Secrets

# Temporary, manually-dispatched workflow that finishes Baby Quirt bootstrap
# credential provisioning. It generates fresh CI deploy + gateway keys inside
# the runner, stores their private halves as GitHub Actions repository secrets,
# commits only the public halves to the feature branch, and reports fingerprints.
#
# It performs NO deployment and never connects to the VPS with the generated key.
# Remove this workflow from main after a successful, verified run.

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Baby Quirt feature branch to receive the public-key commit'
        required: true
        type: string
        default: cursor/baby-quirt-core-e857
      expected_head:
        description: 'Exact 40-character expected current head of target_branch'
        required: true
        type: string
        default: 41669f6f86a702f831ef9624e5e0335fc73e0242

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Secret administration uses the existing repository PAT secret only.
      GH_TOKEN: ${{ secrets.QUIRT_SEC_GH_TOKEN }}
      REPO: StealthEyeLLC/baby-quirt
      # Inputs are captured into env (never interpolated inline in run scripts).
      TARGET_BRANCH: ${{ inputs.target_branch }}
      EXPECTED_HEAD: ${{ inputs.expected_head }}
      VPS_HOST: 51.81.86.225
      VPS_PORT: '22'
      VPS_HOST_FP: 'SHA256:hTe07vTyIU1bZ6C56+58+T2PgctkQ+RYkepn/5j+aaE'
    steps:
      - name: Checkout target branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
        with:
          ref: ${{ inputs.target_branch }}
          token: ${{ secrets.QUIRT_SEC_GH_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Preflight authorization checks
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "ERROR: QUIRT_SEC_GH_TOKEN is empty" >&2
            exit 1
          fi
          gh auth status
          gh api "repos/${REPO}/actions/secrets/public-key" >/dev/null
          PUSH_ACCESS="$(gh api "repos/${REPO}" --jq '.permissions.push')"
          if [ "$PUSH_ACCESS" != "true" ]; then
            echo "ERROR: authenticated identity lacks write access" >&2
            exit 1
          fi
          FULL_NAME="$(gh api "repos/${REPO}" --jq '.full_name')"
          if [ "$FULL_NAME" != "StealthEyeLLC/baby-quirt" ]; then
            echo "ERROR: unexpected repository ${FULL_NAME}" >&2
            exit 1
          fi
          HEAD_SHA="$(gh api "repos/${REPO}/git/ref/heads/${TARGET_BRANCH}" --jq '.object.sha')"
          if [ "$HEAD_SHA" != "$EXPECTED_HEAD" ]; then
            echo "ERROR: ${TARGET_BRANCH} head ${HEAD_SHA} != expected ${EXPECTED_HEAD}" >&2
            exit 1
          fi
          echo "Preflight OK: repo, secret-write authority, and branch head verified."

      - name: Generate keys, provision secrets, and commit public material
        run: |
          set -euo pipefail
          umask 077
          BOOT="$RUNNER_TEMP/baby-quirt-bootstrap"
          cleanup() { rm -rf "$BOOT"; }
          trap cleanup EXIT
          rm -rf "$BOOT"
          mkdir -p "$BOOT"
          chmod 700 "$BOOT"

          # --- CI deployment Ed25519 keypair ---
          ssh-keygen -t ed25519 -a 64 -N '' -C 'baby-quirt-ci-bootstrap' -f "$BOOT/ci-deploy"
          chmod 600 "$BOOT/ci-deploy"
          chmod 644 "$BOOT/ci-deploy.pub"
          ssh-keygen -y -f "$BOOT/ci-deploy" > "$BOOT/ci-deploy-derived.pub"
          diff <(awk '{print $1, $2}' "$BOOT/ci-deploy.pub") \
               <(awk '{print $1, $2}' "$BOOT/ci-deploy-derived.pub")
          CI_FP="$(ssh-keygen -lf "$BOOT/ci-deploy.pub" | awk '{print $2}')"
          CI_PUBKEY_LINE="$(cat "$BOOT/ci-deploy.pub")"
          [ -n "$CI_FP" ]

          # --- Gateway authority Ed25519 keypair ---
          openssl genpkey -algorithm ED25519 -out "$BOOT/gateway-authority-private.pem"
          chmod 600 "$BOOT/gateway-authority-private.pem"
          openssl pkey -in "$BOOT/gateway-authority-private.pem" -pubout \
            -out "$BOOT/gateway-authority-public.pem"
          chmod 644 "$BOOT/gateway-authority-public.pem"
          openssl pkey -in "$BOOT/gateway-authority-private.pem" -pubout \
            -out "$BOOT/gateway-derived-public.pem"
          diff "$BOOT/gateway-authority-public.pem" "$BOOT/gateway-derived-public.pem"
          GATEWAY_FP="$(sha256sum "$BOOT/gateway-authority-public.pem" | awk '{print $1}')"
          [ -n "$GATEWAY_FP" ]

          # --- VPS host-key pin ---
          ssh-keyscan -p "$VPS_PORT" -t ed25519 "$VPS_HOST" > "$BOOT/known_hosts" 2>/dev/null
          test -s "$BOOT/known_hosts"
          if [ "$(grep -c "^${VPS_HOST} ssh-ed25519 " "$BOOT/known_hosts")" -ne 1 ]; then
            echo "ERROR: expected exactly one ed25519 host-key line" >&2
            exit 1
          fi
          HOST_FP="$(ssh-keygen -lf "$BOOT/known_hosts" | awk '{print $2}')"
          if [ "$HOST_FP" != "$VPS_HOST_FP" ]; then
            echo "ERROR: VPS host-key fingerprint mismatch: ${HOST_FP}" >&2
            exit 1
          fi

          # --- Store private materials as repository Actions secrets ---
          # Values are passed via file redirection, never as command-line args.
          gh secret set BABY_QUIRT_VPS_SSH_PRIVATE_KEY --repo "$REPO" < "$BOOT/ci-deploy"
          gh secret set BABY_QUIRT_VPS_SSH_KNOWN_HOSTS --repo "$REPO" < "$BOOT/known_hosts"
          gh secret set BABY_QUIRT_GATEWAY_SIGNING_PRIVATE_KEY --repo "$REPO" < "$BOOT/gateway-authority-private.pem"

          # --- Repository variables (non-secret) ---
          gh variable set BABY_QUIRT_VPS_HOST --repo "$REPO" --body "51.81.86.225"
          gh variable set BABY_QUIRT_VPS_PORT --repo "$REPO" --body "22"
          gh variable set BABY_QUIRT_VPS_USER --repo "$REPO" --body "ubuntu"
          gh variable set BABY_QUIRT_EXPECTED_HOSTNAME --repo "$REPO" --body "vps-c9f04f5e"
          gh variable set BABY_QUIRT_EXPECTED_MACHINE_ID_SHA256 --repo "$REPO" --body "cd189817b39fea60d338b73878240a6fe7db71374c7a0f35ad60f8eb641e8817"
          gh variable set BABY_QUIRT_GATEWAY_USER --repo "$REPO" --body "fix-mcp"
          gh variable set BABY_QUIRT_GATEWAY_UID --repo "$REPO" --body "997"
          gh variable set BABY_QUIRT_GATEWAY_ID --repo "$REPO" --body "stealtheye-horsey-gateway"
          gh variable set BABY_QUIRT_EXPECTED_SUBJECT --repo "$REPO" --body "stealtheye-owner"
          gh variable set BABY_QUIRT_AUTHORITY_CLASS --repo "$REPO" --body "unrestricted-owner"
          gh variable set BABY_QUIRT_OAUTH_ISSUER --repo "$REPO" --body "https://mcp.stealtheye.io"
          gh variable set BABY_QUIRT_OAUTH_RESOURCE --repo "$REPO" --body "https://mcp.stealtheye.io"
          gh variable set BABY_QUIRT_OAUTH_AUDIENCE --repo "$REPO" --body "https://mcp.stealtheye.io"
          gh variable set BABY_QUIRT_OAUTH_JWKS_URI --repo "$REPO" --body "https://mcp.stealtheye.io/oauth/jwks.json"
          gh variable set BABY_QUIRT_OWNER_PRINCIPAL_FINGERPRINT --repo "$REPO" --body "$GATEWAY_FP"

          # --- Replace committed public material ---
          cp "$BOOT/ci-deploy.pub" ops/bootstrap/baby-quirt-ci-deploy.pub
          cp "$BOOT/gateway-authority-public.pem" ops/bootstrap/gateway-authority-public.pem
          GATEWAY_FP="$GATEWAY_FP" CI_FP="$CI_FP" HOST_FP="$HOST_FP" python3 - <<'PY'
          import os
          path = "ops/bootstrap/README.md"
          vals = {
              "Gateway authority public key": os.environ["GATEWAY_FP"],
              "CI deploy SSH public key": os.environ["CI_FP"],
              "VPS SSH host key (ed25519)": os.environ["HOST_FP"],
          }
          out, in_section = [], False
          for line in open(path).read().split("\n"):
              if line.startswith("## "):
                  in_section = line.strip() == "## Fingerprints (non-secret)"
              if in_section and line.startswith("|"):
                  cells = [c.strip() for c in line.strip().strip("|").split("|")]
                  if len(cells) == 2 and cells[0] in vals:
                      line = "| " + cells[0] + " | `" + vals[cells[0]] + "` |"
              out.append(line)
          open(path, "w").write("\n".join(out))
          PY

          # --- Guard: no private key material may be tracked ---
          if git grep -nI 'BEGIN.*PRIVATE KEY' -- . ':!package-lock.json'; then
            echo "ERROR: private key material found in tracked source" >&2
            exit 1
          fi

          # --- Commit and push public material to the feature branch ---
          git config user.name "baby-quirt-bootstrap[bot]"
          git config user.email "baby-quirt-bootstrap[bot]@users.noreply.github.com"
          git add ops/bootstrap/baby-quirt-ci-deploy.pub \
                  ops/bootstrap/gateway-authority-public.pem \
                  ops/bootstrap/README.md
          if git diff --cached --quiet; then
            echo "ERROR: expected public-key changes but none were staged" >&2
            exit 1
          fi
          git diff --cached --stat
          git commit -m "chore: synchronize final bootstrap credentials"
          git push origin "HEAD:${TARGET_BRANCH}"
          FINAL_HEAD="$(git rev-parse HEAD)"

          # --- Publish non-secret evidence for later steps ---
          {
            echo "CI_FP=$CI_FP"
            echo "CI_PUBKEY_LINE=$CI_PUBKEY_LINE"
            echo "GATEWAY_FP=$GATEWAY_FP"
            echo "HOST_FP=$HOST_FP"
            echo "FINAL_HEAD=$FINAL_HEAD"
          } >> "$GITHUB_ENV"

      - name: Verify provisioning (names only, never values)
        run: |
          set -euo pipefail
          NAMES="$(gh secret list --repo "$REPO" --json name --jq '.[].name')"
          for REQUIRED in \
            QUIRT_ALL_GH_TOKEN \
            QUIRT_SEC_GH_TOKEN \
            BABY_QUIRT_VPS_SSH_PRIVATE_KEY \
            BABY_QUIRT_VPS_SSH_KNOWN_HOSTS \
            BABY_QUIRT_GATEWAY_SIGNING_PRIVATE_KEY; do
            printf '%s\n' "$NAMES" | grep -Fxq "$REQUIRED" || {
              echo "ERROR: missing repository secret $REQUIRED" >&2
              exit 1
            }
          done
          for FORBIDDEN in quirt_sec_gh_token quirt_all_gh_token; do
            if printf '%s\n' "$NAMES" | grep -Fxq "$FORBIDDEN"; then
              echo "ERROR: lowercase token secret $FORBIDDEN must not exist" >&2
              exit 1
            fi
          done
          echo "Repository variables:"
          gh variable list --repo "$REPO"
          CURRENT_HEAD="$(gh api "repos/${REPO}/git/ref/heads/${TARGET_BRANCH}" --jq '.object.sha')"
          if [ "$CURRENT_HEAD" = "$EXPECTED_HEAD" ]; then
            echo "ERROR: branch head did not advance after commit" >&2
            exit 1
          fi
          echo "Verified: required secrets present, forbidden names absent, branch advanced."

      - name: Write non-secret evidence summary
        run: |
          set -euo pipefail
          {
            echo "# Baby Quirt Bootstrap Secret Provisioning"
            echo
            echo "- Repository: \`$REPO\`"
            echo "- Target branch: \`$TARGET_BRANCH\`"
            echo "- Starting head: \`$EXPECTED_HEAD\`"
            echo "- Final head: \`$FINAL_HEAD\`"
            echo "- Secret names configured: \`BABY_QUIRT_VPS_SSH_PRIVATE_KEY\`, \`BABY_QUIRT_VPS_SSH_KNOWN_HOSTS\`, \`BABY_QUIRT_GATEWAY_SIGNING_PRIVATE_KEY\`"
            echo "- CI deploy public-key line: \`$CI_PUBKEY_LINE\`"
            echo "- CI deploy fingerprint: \`$CI_FP\`"
            echo "- Gateway public-key fingerprint: \`$GATEWAY_FP\`"
            echo "- Owner-principal fingerprint: \`$GATEWAY_FP\`"
            echo "- VPS host-key fingerprint: \`$HOST_FP\`"
            echo "- No private key committed: confirmed"
            echo "- No deployment performed: confirmed"
            echo "- PR #2 not merged: confirmed"
            echo
            echo "## Repository variables (non-secret)"
            echo '```'
            echo "BABY_QUIRT_VPS_HOST=51.81.86.225"
            echo "BABY_QUIRT_VPS_PORT=22"
            echo "BABY_QUIRT_VPS_USER=ubuntu"
            echo "BABY_QUIRT_EXPECTED_HOSTNAME=vps-c9f04f5e"
            echo "BABY_QUIRT_EXPECTED_MACHINE_ID_SHA256=cd189817b39fea60d338b73878240a6fe7db71374c7a0f35ad60f8eb641e8817"
            echo "BABY_QUIRT_GATEWAY_USER=fix-mcp"
            echo "BABY_QUIRT_GATEWAY_UID=997"
            echo "BABY_QUIRT_GATEWAY_ID=stealtheye-horsey-gateway"
            echo "BABY_QUIRT_EXPECTED_SUBJECT=stealtheye-owner"
            echo "BABY_QUIRT_AUTHORITY_CLASS=unrestricted-owner"
            echo "BABY_QUIRT_OAUTH_ISSUER=https://mcp.stealtheye.io"
            echo "BABY_QUIRT_OAUTH_RESOURCE=https://mcp.stealtheye.io"
            echo "BABY_QUIRT_OAUTH_AUDIENCE=https://mcp.stealtheye.io"
            echo "BABY_QUIRT_OAUTH_JWKS_URI=https://mcp.stealtheye.io/oauth/jwks.json"
            echo "BABY_QUIRT_OWNER_PRINCIPAL_FINGERPRINT=$GATEWAY_FP"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup bootstrap material
        if: always()
        run: rm -rf "$RUNNER_TEMP/baby-quirt-bootstrap"
