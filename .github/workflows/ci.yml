name: CI

on:
  push:
    branches: [main, 'build/**', 'cursor/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact source SHA
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install system dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential gcc g++ make python3 python3-dev pkg-config \
            git jq curl ca-certificates openssh-client openssl tmux tar gzip xz-utils \
            rsync util-linux systemd systemd-dev libsystemd-dev

      - name: Setup Node.js 24.18
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.18.0'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm run build:native

      - name: Verify runtime dependencies
        run: bash scripts/verify-runtime-deps.sh

      - name: Typecheck
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Integration tests
        run: npm run test:integration

      - name: Acceptance tests
        run: npm run test:acceptance

      - name: Contract validation
        run: npm run test:contracts

  build-release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout exact source SHA
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install system dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential gcc g++ make python3 python3-dev pkg-config \
            git jq curl ca-certificates openssh-client openssl tmux tar gzip xz-utils \
            rsync util-linux systemd systemd-dev libsystemd-dev

      - name: Setup Node.js 24.18
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.18.0'
          cache: npm

      - name: Prepare exact non-production release identity
        run: |
          COMMIT="${{ github.event.pull_request.head.sha || github.sha }}"
          test "$COMMIT" = "$(git rev-parse HEAD)"
          TREE="$(git show -s --format=%T "$COMMIT")"
          printf 'BABY_QUIRT_SOURCE_COMMIT=%s\n' "$COMMIT" >> "$GITHUB_ENV"
          printf 'BABY_QUIRT_SOURCE_TREE=%s\n' "$TREE" >> "$GITHUB_ENV"
          printf 'BABY_QUIRT_RELEASE_SIGNING_PRIVATE_KEY=%s\n' /tmp/baby-quirt-ci-release-private.pem >> "$GITHUB_ENV"
          printf 'BABY_QUIRT_RELEASE_SIGNING_PUBLIC_KEY=%s\n' /tmp/baby-quirt-ci-release-public.pem >> "$GITHUB_ENV"
          printf 'BABY_QUIRT_RELEASE_SIGNING_KEY_ID=%s\n' ci-ephemeral-untrusted-v1 >> "$GITHUB_ENV"
          printf 'BABY_QUIRT_COMPATIBLE_GATEWAY_MANIFEST_DIGEST=%064d\n' 0 >> "$GITHUB_ENV"
          openssl genpkey -algorithm Ed25519 -out /tmp/baby-quirt-ci-release-private.pem
          openssl pkey -in /tmp/baby-quirt-ci-release-private.pem -pubout -out /tmp/baby-quirt-ci-release-public.pem

      - name: Run frozen gates and build candidate twice
        run: bash scripts/release.sh 0.3.0-ci

      - name: Verify artifact contents
        run: |
          ls -la release/
          test "$(find release -maxdepth 1 -type f -name 'baby-quirt-0.3.0-ci*' | wc -l)" -eq 6
          for suffix in tar.gz sha256 manifest.json spdx.json test-evidence.json candidate-report.json; do
            test -f "release/baby-quirt-0.3.0-ci.$suffix"
          done
          python3 - <<'PY'
          import hashlib, json, os, pathlib
          root = pathlib.Path('release')
          manifest = json.loads((root / 'baby-quirt-0.3.0-ci.manifest.json').read_text())
          report = json.loads((root / 'baby-quirt-0.3.0-ci.candidate-report.json').read_text())
          evidence = json.loads((root / 'baby-quirt-0.3.0-ci.test-evidence.json').read_text())
          archive = root / 'baby-quirt-0.3.0-ci.tar.gz'
          assert manifest['source']['commit'] == os.environ['BABY_QUIRT_SOURCE_COMMIT']
          assert manifest['source']['tree'] == os.environ['BABY_QUIRT_SOURCE_TREE']
          assert manifest['archive']['sha256'] == hashlib.sha256(archive.read_bytes()).hexdigest()
          assert manifest['reproducibility']['byteIdentical'] is True
          assert report['passed'] is True
          assert evidence['testCount'] > 0 and all(suite['passed'] for suite in evidence['suites'])
          assert not list(root.glob('*.pem'))
          PY

      - name: Upload non-production candidate evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: baby-quirt-ci-candidate-${{ github.event.pull_request.head.sha || github.sha }}
          path: release/baby-quirt-0.3.0-ci*
          retention-days: 30

      - name: Remove ephemeral signing material
        if: always()
        run: rm -f /tmp/baby-quirt-ci-release-private.pem /tmp/baby-quirt-ci-release-public.pem
