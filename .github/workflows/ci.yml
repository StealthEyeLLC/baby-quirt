name: CI

on:
  push:
    branches: [main, 'build/**', 'cursor/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact source SHA
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install system dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential gcc g++ make python3 python3-dev pkg-config \
            git jq curl ca-certificates openssl tmux util-linux systemd systemd-dev libsystemd-dev

      - name: Setup Node.js 24.18
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.18.0'
          cache: npm

      - name: Install exact dependencies
        run: npm ci --include=dev

      - name: Build native addon
        run: npm run build:native

      - name: Typecheck and build
        run: npm run lint && npm run build

      - name: Complete test suite
        run: |
          sudo env PATH="$PATH" HOME="$HOME" npm run test
          npm run test:integration
          npm run test:acceptance
          npm run test:contracts

  reproducible-candidate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout exact source SHA
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install native build dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential gcc g++ make python3 python3-dev pkg-config

      - name: Setup Node.js 24.18
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.18.0'
          cache: npm

      - name: Install exact dependencies
        run: npm ci --include=dev

      - name: Freeze source identity
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "BABY_QUIRT_SOURCE_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "BABY_QUIRT_SOURCE_TREE=$(git rev-parse HEAD^{tree})" >> "$GITHUB_ENV"
          echo "BABY_QUIRT_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build candidate A
        run: |
          mkdir -p /tmp/bq-build-a /tmp/bq-output-a
          BABY_QUIRT_BUILD_ROOT=/tmp/bq-build-a BABY_QUIRT_OUTPUT_DIR=/tmp/bq-output-a \
            bash scripts/build-bundle.sh "$BABY_QUIRT_VERSION"

      - name: Build candidate B
        run: |
          mkdir -p /tmp/bq-build-b /tmp/bq-output-b
          BABY_QUIRT_BUILD_ROOT=/tmp/bq-build-b BABY_QUIRT_OUTPUT_DIR=/tmp/bq-output-b \
            bash scripts/build-bundle.sh "$BABY_QUIRT_VERSION"

      - name: Require byte-identical outputs and verify extracted runtime
        run: |
          cmp "/tmp/bq-output-a/baby-quirt-$BABY_QUIRT_VERSION.tar.gz" \
              "/tmp/bq-output-b/baby-quirt-$BABY_QUIRT_VERSION.tar.gz"
          cmp "/tmp/bq-output-a/baby-quirt-$BABY_QUIRT_VERSION.build.json" \
              "/tmp/bq-output-b/baby-quirt-$BABY_QUIRT_VERSION.build.json"
          node --import tsx scripts/verify-candidate.ts \
            --archive "/tmp/bq-output-a/baby-quirt-$BABY_QUIRT_VERSION.tar.gz" \
            --build-record "/tmp/bq-output-a/baby-quirt-$BABY_QUIRT_VERSION.build.json"

      - name: Upload unsigned verified candidate evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: baby-quirt-verified-candidate
          path: |
            /tmp/bq-output-a/baby-quirt-${{ env.BABY_QUIRT_VERSION }}.tar.gz
            /tmp/bq-output-a/baby-quirt-${{ env.BABY_QUIRT_VERSION }}.build.json
            /tmp/bq-output-a/baby-quirt-${{ env.BABY_QUIRT_VERSION }}.sha256
          retention-days: 30
