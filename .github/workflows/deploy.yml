name: Deploy Baby Quirt MCP Temporary

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout exact standalone MCP source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: StealthEyeLLC/baby-quirt-mcp
          ref: 6cf1477cd1293e09c0d54830117a4dfd036601ff
          token: ${{ secrets.quirt_all_gh_token }}
          fetch-depth: 0

      - name: Setup Node.js 24.18
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24.18.0'

      - name: Validate and build exact release
        env:
          BABY_QUIRT_MCP_SOURCE_COMMIT: 6cf1477cd1293e09c0d54830117a4dfd036601ff
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "6cf1477cd1293e09c0d54830117a4dfd036601ff"
          npm run check
          npm test
          bash -n scripts/*.sh
          bash scripts/release.sh 0.1.0-prod.1

      - name: Prepare protected staging material
        env:
          GATEWAY_PRIVATE_KEY: ${{ secrets.BABY_QUIRT_GATEWAY_SIGNING_PRIVATE_KEY }}
          SSH_PRIVATE_KEY: ${{ secrets.BABY_QUIRT_VPS_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.BABY_QUIRT_VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$GATEWAY_PRIVATE_KEY"
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"
          umask 077
          mkdir -p staging ~/.ssh
          cp release/baby-quirt-mcp-0.1.0-prod.1.tar.gz staging/
          cp release/baby-quirt-mcp-0.1.0-prod.1.sha256 staging/
          cp release/baby-quirt-mcp-0.1.0-prod.1.manifest.json staging/
          cp scripts/remote-install.sh staging/
          printf '%s\n' "$GATEWAY_PRIVATE_KEY" > staging/gateway-authority-private.pem
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 staging/gateway-authority-private.pem ~/.ssh/deploy_key ~/.ssh/known_hosts
          openssl pkey -in staging/gateway-authority-private.pem -pubout -outform DER > staging/actual.der
          openssl pkey -pubin -in ops/bootstrap/gateway-authority-public.pem -outform DER > staging/expected.der
          cmp -s staging/actual.der staging/expected.der
          rm -f staging/actual.der staging/expected.der

      - name: Verify target and upload
        env:
          VPS_HOST: ${{ vars.BABY_QUIRT_VPS_HOST }}
          VPS_PORT: ${{ vars.BABY_QUIRT_VPS_PORT }}
          VPS_USER: ${{ vars.BABY_QUIRT_VPS_USER }}
          EXPECTED_HOSTNAME: ${{ vars.BABY_QUIRT_EXPECTED_HOSTNAME }}
          EXPECTED_MACHINE_ID: ${{ vars.BABY_QUIRT_EXPECTED_MACHINE_ID_SHA256 }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          USER="${VPS_USER:-ubuntu}"
          SSH=(ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=yes)
          SCP=(scp -i ~/.ssh/deploy_key -P "$PORT" -o StrictHostKeyChecking=yes)
          "${SSH[@]}" "$USER@$VPS_HOST" "test \"\$(hostname)\" = '$EXPECTED_HOSTNAME' && test \"\$(tr -d '\\r\\n' </etc/machine-id | sha256sum | awk '{print \$1}')\" = '$EXPECTED_MACHINE_ID' && sudo -n true && test -x /opt/node-v24.18.0-linux-x64/bin/node && sudo test -S /run/horsey/baby-quirt.sock && sudo test ! -e /opt/baby-quirt-mcp/releases/0.1.0-prod.1"
          "${SSH[@]}" "$USER@$VPS_HOST" "umask 077; rm -rf /tmp/baby-quirt-mcp-deploy-0.1.0-prod.1; mkdir -m 0700 /tmp/baby-quirt-mcp-deploy-0.1.0-prod.1"
          "${SCP[@]}" staging/baby-quirt-mcp-0.1.0-prod.1.tar.gz staging/baby-quirt-mcp-0.1.0-prod.1.sha256 staging/baby-quirt-mcp-0.1.0-prod.1.manifest.json staging/gateway-authority-private.pem staging/remote-install.sh "$USER@$VPS_HOST:/tmp/baby-quirt-mcp-deploy-0.1.0-prod.1/"

      - name: Install and run signed live smoke
        env:
          VPS_HOST: ${{ vars.BABY_QUIRT_VPS_HOST }}
          VPS_PORT: ${{ vars.BABY_QUIRT_VPS_PORT }}
          VPS_USER: ${{ vars.BABY_QUIRT_VPS_USER }}
          EXPECTED_HOSTNAME: ${{ vars.BABY_QUIRT_EXPECTED_HOSTNAME }}
          EXPECTED_MACHINE_ID: ${{ vars.BABY_QUIRT_EXPECTED_MACHINE_ID_SHA256 }}
          EXPECTED_PUBLIC_KEY_SHA256: ${{ vars.BABY_QUIRT_OWNER_PRINCIPAL_FINGERPRINT }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          USER="${VPS_USER:-ubuntu}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=yes "$USER@$VPS_HOST" "sudo env BABY_QUIRT_MCP_VERSION='0.1.0-prod.1' BABY_QUIRT_MCP_STAGING_PATH='/tmp/baby-quirt-mcp-deploy-0.1.0-prod.1' BABY_QUIRT_MCP_EXPECTED_COMMIT='6cf1477cd1293e09c0d54830117a4dfd036601ff' BABY_QUIRT_EXPECTED_HOSTNAME='$EXPECTED_HOSTNAME' BABY_QUIRT_EXPECTED_MACHINE_ID_SHA256='$EXPECTED_MACHINE_ID' BABY_QUIRT_OWNER_PRINCIPAL_FINGERPRINT='$EXPECTED_PUBLIC_KEY_SHA256' bash '/tmp/baby-quirt-mcp-deploy-0.1.0-prod.1/remote-install.sh'"
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=yes "$USER@$VPS_HOST" "sudo -u fix-mcp /bin/bash -c 'set -euo pipefail; set -a; source /etc/baby-quirt-mcp/environment; set +a; exec /opt/node-v24.18.0-linux-x64/bin/node /opt/baby-quirt-mcp/current/scripts/live-smoke.js'"
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=yes "$USER@$VPS_HOST" "curl -fsS --max-time 5 http://127.0.0.1:2096/healthz; echo; sudo systemctl is-active baby-quirt-mcp.service; sudo readlink -f /opt/baby-quirt-mcp/current"

      - name: Remove ephemeral material
        if: always()
        env:
          VPS_HOST: ${{ vars.BABY_QUIRT_VPS_HOST }}
          VPS_PORT: ${{ vars.BABY_QUIRT_VPS_PORT }}
          VPS_USER: ${{ vars.BABY_QUIRT_VPS_USER }}
        run: |
          PORT="${VPS_PORT:-22}"
          USER="${VPS_USER:-ubuntu}"
          if [ -f ~/.ssh/deploy_key ]; then
            ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=yes "$USER@$VPS_HOST" "sudo rm -rf /tmp/baby-quirt-mcp-deploy-0.1.0-prod.1" || true
          fi
          rm -rf staging ~/.ssh/deploy_key
